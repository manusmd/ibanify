name: ibanify

networks:
  internal:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-nginx-proxy-manager_default}

services:
  api:
    container_name: ibanify-api
    image: ${API_IMAGE:?set API_IMAGE to ghcr.io/<owner>/ibanify-api:<tag>}
    networks:
      - internal
    environment:
      BRANDFETCH_CLIENT_ID: ${BRANDFETCH_CLIENT_ID:-}
      IBANIFY_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://iban.manu-web.de,http://localhost:5173}

  web:
    container_name: ibanify-web
    image: ${WEB_IMAGE:?set WEB_IMAGE to ghcr.io/<owner>/ibanify-web:<tag>}
    networks:
      - internal
      - proxy
    depends_on:
      api:
        condition: service_healthy
