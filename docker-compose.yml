name: ibanify

services:
  api:
    image: ${API_IMAGE:-ibanify-api:local}
    build:
      context: ./ibanify-core
      dockerfile: Dockerfile
    environment:
      BRANDFETCH_CLIENT_ID: ${BRANDFETCH_CLIENT_ID:-}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    image: ${WEB_IMAGE:-ibanify-web:local}
    build:
      context: ./ibanify-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
