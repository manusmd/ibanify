spring.application.name=ibanify-core

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true

iban.openiban.base-url=https://openiban.com
iban.openiban.connect-timeout=5s
iban.openiban.read-timeout=10s
iban.openiban.get-bic=true
iban.openiban.validate-bank-code=true

ibanify.cors.allowed-origins=http://localhost:5173

ibanify.brandfetch.client-id=${BRANDFETCH_CLIENT_ID:}
ibanify.brandfetch.api-base-url=https://api.brandfetch.io
ibanify.brandfetch.connect-timeout=3s
ibanify.brandfetch.read-timeout=5s
ibanify.brandfetch.cdn-host=https://cdn.brandfetch.io

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
